<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#1d3557"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bgGrad2)"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
  </g>

  <!-- win-probability split bar: team A vs team B -->
  <g>
    <rect x="220" y="200" width="360" height="26" rx="13" fill="#ffffff" fill-opacity="0.15"/>
    <path d="M 220 200 h 205 a 13 13 0 0 1 0 26 h -205 a 13 13 0 0 1 0 -26 Z" fill="#f1faee"/>
    <text x="220" y="185" font-family="'Montserrat', sans-serif" font-size="18" font-weight="700" fill="#f1faee">TEAM A</text>
    <text x="580" y="185" text-anchor="end" font-family="'Montserrat', sans-serif" font-size="18" font-weight="700" fill="#ffffff" fill-opacity="0.85">TEAM B</text>
    <text x="422" y="248" text-anchor="middle" font-family="'Montserrat', sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.7">BO3 SERIES WIN PROBABILITY</text>
  </g>

  <!-- crosshair / reticle signature element -->
  <g stroke="#ffffff" stroke-opacity="0.9" stroke-width="3" fill="none">
    <circle cx="400" cy="120" r="34"/>
    <line x1="400" y1="70" x2="400" y2="94"/>
    <line x1="400" y1="146" x2="400" y2="170"/>
    <line x1="350" y1="120" x2="374" y2="120"/>
    <line x1="426" y1="120" x2="450" y2="120"/>
  </g>
  <circle cx="400" cy="120" r="4" fill="#ffffff"/>

  <!-- map history ticks -->
  <g stroke="#ffffff" stroke-opacity="0.5" stroke-width="4" stroke-linecap="round">
    <line x1="240" y1="300" x2="240" y2="330"/>
    <line x1="290" y1="300" x2="290" y2="315"/>
    <line x1="340" y1="300" x2="340" y2="335"/>
    <line x1="390" y1="300" x2="390" y2="320"/>
    <line x1="440" y1="300" x2="440" y2="340"/>
    <line x1="490" y1="300" x2="490" y2="312"/>
    <line x1="540" y1="300" x2="540" y2="328"/>
  </g>

  <g font-family="'Montserrat', sans-serif" font-weight="600" font-size="18" fill="#ffffff" fill-opacity="0.9">
    <text x="60" y="395">MATCH OUTCOME PREDICTION</text>
    <text x="60" y="420" font-size="14" fill-opacity="0.65" font-weight="500">TEAM FORM + MAP HISTORY &#8594; SERIES SIMULATION</text>
  </g>
</svg>
